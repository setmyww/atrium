<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrium — пространство для сообщества</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { background: #161b22; border-bottom: 1px solid #21262d; padding: 16px 0; }
.header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.logo { font-size: 24px; font-weight: bold; color: #58a6ff; }
.auth-section button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
.auth-section button:hover { background: #2ea043; }
.user-info { display: flex; align-items: center; gap: 12px; }
.user-info img { width: 32px; height: 32px; border-radius: 50%; }
.logout-btn { background: #21262d; color: #c9d1d9; margin-left: 8px; }
.tabs { display: flex; gap: 16px; margin: 24px 0; border-bottom: 1px solid #21262d; }
.tab { padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { border-bottom-color: #58a6ff; color: #58a6ff; }
.discussions-header { display: flex; justify-content: space-between; align-items: center; margin: 24px 0; }
.discussions-header h2 { font-size: 24px; }
.new-btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
.new-btn:hover { background: #2ea043; }
.discussion-list { display: flex; flex-direction: column; gap: 12px; }
.discussion-item { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 16px; cursor: pointer; }
.discussion-item:hover { border-color: #58a6ff; }
.discussion-header { display: flex; justify-content: space-between; align-items: start; }
.discussion-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.discussion-meta { display: flex; gap: 16px; font-size: 14px; color: #8b949e; }
.category-badge { background: #1f6feb; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
.empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
.modal.show { display: flex; justify-content: center; align-items: center; }
.modal-content { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h3 { font-size: 20px; }
.close-btn { background: none; border: none; color: #8b949e; font-size: 24px; cursor: pointer; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-family: inherit; }
.form-group textarea { min-height: 120px; resize: vertical; }
.form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
.btn-primary { background: #238636; color: white; }
.btn-primary:hover { background: #2ea043; }
.btn-secondary { background: #21262d; color: #c9d1d9; }
.btn-secondary:hover { background: #30363d; }
.discussion-view { display: none; }
.discussion-view.active { display: block; }
.discussion-content { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 24px; margin-bottom: 24px; }
.discussion-author { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.discussion-author img { width: 48px; height: 48px; border-radius: 50%; }
.discussion-body { line-height: 1.6; margin: 16px 0; }
.comments-section h3 { margin-bottom: 16px; }
.comment { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
.comment-author { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.comment-author img { width: 36px; height: 36px; border-radius: 50%; }
.comment-meta { display: flex; flex-direction: column; }
.comment-body { line-height: 1.6; }
.back-btn { background: #21262d; color: #c9d1d9; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
.back-btn:hover { background: #30363d; }
</style>
</head>
<body>
<header>
<div class="header-content">
<div class="logo">Atrium</div>
<div class="auth-section" id="authSection">
<button onclick="login()">Войти через GitHub</button>
</div>
</div>
</header>

<div class="container">
<div id="discussionsList" class="discussions-list-view">
<div class="discussions-header">
<h2>Обсуждения</h2>
<button class="new-btn" id="newDiscussionBtn" onclick="openNewDiscussion()" style="display: none;">Создать обсуждение</button>
</div>
<div class="discussion-list" id="discussionList">
<div class="empty-state">Загрузка...</div>
</div>
</div>

<div id="discussionView" class="discussion-view">
<button class="back-btn" onclick="showDiscussionsList()">← Назад к обсуждениям</button>
<div id="discussionContent"></div>
<div class="comments-section">
<h3>Комментарии</h3>
<div id="commentsList"></div>
<div class="form-group" id="commentForm" style="display: none; margin-top: 20px;">
<textarea id="commentText" placeholder="Написать комментарий..."></textarea>
<button class="btn btn-primary" onclick="addComment()" style="margin-top: 8px;">Отправить</button>
</div>
</div>
</div>
</div>

<div id="newDiscussionModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3>Новое обсуждение</h3>
<button class="close-btn" onclick="closeNewDiscussion()">&times;</button>
</div>
<div class="form-group">
<label>Заголовок</label>
<input type="text" id="discussionTitle" placeholder="О чём хотите поговорить?">
</div>
<div class="form-group">
<label>Категория</label>
<select id="discussionCategory">
<option value="general">Общее</option>
<option value="questions">Вопросы</option>
<option value="ideas">Идеи</option>
<option value="announcements">Объявления</option>
</select>
</div>
<div class="form-group">
<label>Описание</label>
<textarea id="discussionContent" placeholder="Подробности..."></textarea>
</div>
<div class="form-actions">
<button class="btn btn-secondary" onclick="closeNewDiscussion()">Отмена</button>
<button class="btn btn-primary" onclick="createDiscussion()">Создать</button>
</div>
</div>
</div>

<div id="profileSetupModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3>Настройка профиля</h3>
</div>
<div class="form-group">
<label>Имя</label>
<input type="text" id="profileName" placeholder="Ваше имя">
</div>
<div class="form-group">
<label>Никнейм</label>
<input type="text" id="profileHandle" placeholder="@никнейм">
</div>
<div class="form-group">
<label>О себе</label>
<textarea id="profileBio" placeholder="Расскажите о себе..."></textarea>
</div>
<div class="form-actions">
<button class="btn btn-primary" onclick="completeProfileSetup()">Сохранить</button>
</div>
</div>
</div>

<script>
let currentUser = null;
let currentDiscussionId = null;
let discussions = [];

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('setup') === 'true') {
    await checkAuth();
    if (currentUser && !currentUser.profileComplete) {
      showProfileSetup();
    }
  } else {
    await checkAuth();
  }
  await loadDiscussions();
}

async function checkAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (data.user) {
      currentUser = data.user;
      updateAuthUI();
    }
  } catch (e) {}
}

function updateAuthUI() {
  const authSection = document.getElementById('authSection');
  const newBtn = document.getElementById('newDiscussionBtn');
  const commentForm = document.getElementById('commentForm');
  if (currentUser) {
    authSection.innerHTML = `
      <div class="user-info">
        <img src="${currentUser.avatar || ''}" alt="${currentUser.name}">
        <span>${currentUser.name}</span>
        <button class="logout-btn" onclick="logout()">Выйти</button>
      </div>
    `;
    newBtn.style.display = 'block';
    if (currentDiscussionId) commentForm.style.display = 'block';
  } else {
    authSection.innerHTML = '<button onclick="login()">Войти через GitHub</button>';
    newBtn.style.display = 'none';
    commentForm.style.display = 'none';
  }
}

function login() {
  window.location.href = '/auth/github';
}

function logout() {
  window.location.href = '/auth/logout';
}

function showProfileSetup() {
  document.getElementById('profileSetupModal').classList.add('show');
  if (currentUser) {
    document.getElementById('profileName').value = currentUser.name || '';
    document.getElementById('profileHandle').value = currentUser.handle || '';
    document.getElementById('profileBio').value = currentUser.bio || '';
  }
}

async function completeProfileSetup() {
  const name = document.getElementById('profileName').value.trim();
  const handle = document.getElementById('profileHandle').value.trim();
  const bio = document.getElementById('profileBio').value.trim();
  if (!name || !handle) {
    alert('Укажите имя и никнейм');
    return;
  }
  try {
    const res = await fetch('/api/profile/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, handle, bio })
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      document.getElementById('profileSetupModal').classList.remove('show');
      updateAuthUI();
      window.history.replaceState({}, '', '/');
    } else {
      alert(data.error || 'Ошибка');
    }
  } catch (e) {
    alert('Ошибка сети');
  }
}

async function loadDiscussions() {
  try {
    const res = await fetch('/api/discussions');
    discussions = await res.json();
    renderDiscussions();
  } catch (e) {
    document.getElementById('discussionList').innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
  }
}

function renderDiscussions() {
  const list = document.getElementById('discussionList');
  if (discussions.length === 0) {
    list.innerHTML = '<div class="empty-state">Пока нет обсуждений. Создайте первое!</div>';
    return;
  }
  list.innerHTML = discussions.map(d => `
    <div class="discussion-item" onclick="openDiscussion(${d.id})">
      <div class="discussion-header">
        <div>
          <div class="discussion-title">${escapeHtml(d.title)}</div>
          <div class="discussion-meta">
            <span class="category-badge">${getCategoryName(d.category)}</span>
            <span>Автор: ${escapeHtml(d.author)}</span>
            <span>${d.commentCount || 0} комментариев</span>
            <span>${formatDate(d.createdAt)}</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function getCategoryName(cat) {
  const map = { general: 'Общее', questions: 'Вопросы', ideas: 'Идеи', announcements: 'Объявления' };
  return map[cat] || cat;
}

function formatDate(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (minutes < 1) return 'только что';
  if (minutes < 60) return `${minutes} мин назад`;
  if (hours < 24) return `${hours} ч назад`;
  if (days < 7) return `${days} дн назад`;
  return date.toLocaleDateString('ru-RU');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function openNewDiscussion() {
  if (!currentUser) {
    alert('Войдите, чтобы создать обсуждение');
    return;
  }
  document.getElementById('newDiscussionModal').classList.add('show');
}

function closeNewDiscussion() {
  document.getElementById('newDiscussionModal').classList.remove('show');
  document.getElementById('discussionTitle').value = '';
  document.getElementById('discussionCategory').value = 'general';
  document.getElementById('discussionContent').value = '';
}

async function createDiscussion() {
  const title = document.getElementById('discussionTitle').value.trim();
  const category = document.getElementById('discussionCategory').value;
  const content = document.getElementById('discussionContent').value.trim();
  if (!title || !content) {
    alert('Заполните все поля');
    return;
  }
  try {
    const res = await fetch('/api/discussions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, category, content })
    });
    const data = await res.json();
    if (data.id) {
      closeNewDiscussion();
      await loadDiscussions();
    } else {
      alert(data.error || 'Ошибка');
    }
  } catch (e) {
    alert('Ошибка сети');
  }
}

async function openDiscussion(id) {
  currentDiscussionId = id;
  try {
    const res = await fetch(`/api/discussions/${id}`);
    const discussion = await res.json();
    document.getElementById('discussionContent').innerHTML = `
      <div class="discussion-content">
        <div class="discussion-author">
          <img src="${discussion.authorAvatar || ''}" alt="${escapeHtml(discussion.author)}">
          <div>
            <strong>${escapeHtml(discussion.author)}</strong> @${escapeHtml(discussion.authorHandle)}
            <div style="color: #8b949e; font-size: 14px;">${formatDate(discussion.createdAt)}</div>
          </div>
        </div>
        <h1>${escapeHtml(discussion.title)}</h1>
        <div class="discussion-body">${escapeHtml(discussion.content)}</div>
      </div>
    `;
    await loadComments(id);
    document.getElementById('discussionsList').style.display = 'none';
    document.getElementById('discussionView').classList.add('active');
    if (currentUser) {
      document.getElementById('commentForm').style.display = 'block';
    }
  } catch (e) {
    alert('Ошибка загрузки');
  }
}

async function loadComments(discussionId) {
  try {
    const res = await fetch(`/api/discussions/${discussionId}/comments`);
    const comments = await res.json();
    const list = document.getElementById('commentsList');
    if (comments.length === 0) {
      list.innerHTML = '<div class="empty-state">Пока нет комментариев</div>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment">
        <div class="comment-author">
          <img src="${c.authorAvatar || ''}" alt="${escapeHtml(c.author)}">
          <div class="comment-meta">
            <strong>${escapeHtml(c.author)}</strong> @${escapeHtml(c.authorHandle)}
            <span style="color: #8b949e; font-size: 14px;">${formatDate(c.createdAt)}</span>
          </div>
        </div>
        <div class="comment-body">${escapeHtml(c.content)}</div>
      </div>
    `).join('');
  } catch (e) {}
}

async function addComment() {
  const content = document.getElementById('commentText').value.trim();
  if (!content) return;
  try {
    const res = await fetch(`/api/discussions/${currentDiscussionId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (data.id) {
      document.getElementById('commentText').value = '';
      await loadComments(currentDiscussionId);
    } else {
      alert(data.error || 'Ошибка');
    }
  } catch (e) {
    alert('Ошибка сети');
  }
}

function showDiscussionsList() {
  currentDiscussionId = null;
  document.getElementById('discussionView').classList.remove('active');
  document.getElementById('discussionsList').style.display = 'block';
  document.getElementById('commentForm').style.display = 'none';
}

init();
</script>
</body>
</html>
